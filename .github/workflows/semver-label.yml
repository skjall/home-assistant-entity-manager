name: SemVer label

# Derive the semver:* label from the Conventional Commit PR title so the
# expected release impact is visible at a glance — no manual decision.
#   feat!: / BREAKING CHANGE  -> semver: major
#   feat:                     -> semver: minor
#   fix:                      -> semver: patch
#   anything else             -> no semver label (non-releasing)

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";

            const LABELS = ["semver: major", "semver: minor", "semver: patch"];
            const m = title.match(/^(\w+)(\([^)]*\))?(!)?:/);
            const type = m ? m[1] : null;
            const breaking = (m && m[3] === "!") || /BREAKING CHANGE/.test(body);

            let want = null;
            if (breaking) want = "semver: major";
            else if (type === "feat") want = "semver: minor";
            else if (type === "fix") want = "semver: patch";

            const current = (
              await github.rest.issues.listLabelsOnIssue({ ...repo, issue_number: pr.number })
            ).data.map((l) => l.name);

            for (const l of LABELS) {
              if (l !== want && current.includes(l)) {
                await github.rest.issues.removeLabel({ ...repo, issue_number: pr.number, name: l }).catch(() => {});
              }
            }
            if (want && !current.includes(want)) {
              await github.rest.issues.addLabels({ ...repo, issue_number: pr.number, labels: [want] });
            }
            core.info(want ? `Set ${want}` : "No release-bearing type — no semver label");
