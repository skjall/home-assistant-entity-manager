name: PR title

# Enforce Conventional Commit PR titles. PRs are squash-merged, so the PR title
# becomes the commit on main — and that is what release-please reads to compute
# the next version. A non-conventional title would break automated versioning.

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — only feat/fix produce a release (minor/patch);
          # the rest are changelog-visible but non-releasing.
          types: |
            feat
            fix
            docs
            chore
            ci
            test
            refactor
            perf
            build
