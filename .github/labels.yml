# Label definitions, synced by .github/workflows/labels.yml
# Status labels are mutually exclusive (enforced by issue-governance.yml).

# --- Status (exclusive) ---
- name: "status: triage"
  color: "ededed"
  description: "Needs triage / not started"
- name: "status: in progress"
  color: "0e8a16"
  description: "Actively being worked on"
- name: "status: in review"
  color: "fbca04"
  description: "A PR is open / under review"
- name: "status: blocked"
  color: "b60205"
  description: "Blocked by something else"
- name: "status: done"
  color: "5319e7"
  description: "Completed / closed"

# --- Type ---
- name: "type: bug"
  color: "d73a4a"
  description: "Something is not working"
- name: "type: enhancement"
  color: "a2eeef"
  description: "New feature or improvement"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation"
- name: "type: chore"
  color: "cfd3d7"
  description: "Maintenance / tooling"

# --- Process ---
- name: "needs issue"
  color: "e99695"
  description: "PR without a linked issue"
- name: "duplicate"
  color: "cfd3d7"
  description: "This already exists"
- name: "stale"
  color: "795548"
  description: "Inactive — will be closed automatically"
- name: "pinned"
  color: "0e8a16"
  description: "Exempt from the stale bot"
