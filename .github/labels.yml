# Label definitions, synced by .github/workflows/labels.yml
# Status labels are mutually exclusive (enforced by issue-governance.yml).

# --- Status (exclusive) ---
- name: "status: triage"
  color: "ededed"
  description: "Needs triage / not started"
- name: "status: in progress"
  color: "0e8a16"
  description: "Actively being worked on"
- name: "status: in review"
  color: "fbca04"
  description: "A PR is open / under review"
- name: "status: needs info"
  color: "d4c5f9"
  description: "Waiting on clarification from the reporter"
- name: "status: blocked"
  color: "b60205"
  description: "Blocked by something else"
- name: "status: done"
  color: "5319e7"
  description: "Completed / closed"

# --- Type ---
- name: "type: bug"
  color: "d73a4a"
  description: "Something is not working"
- name: "type: enhancement"
  color: "a2eeef"
  description: "New feature or improvement"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation"
- name: "type: chore"
  color: "cfd3d7"
  description: "Maintenance / tooling"

# --- SemVer (derived from the Conventional Commit PR title) ---
- name: "semver: major"
  color: "b60205"
  description: "Breaking change (feat! / BREAKING CHANGE)"
- name: "semver: minor"
  color: "0e8a16"
  description: "Backward-compatible feature (feat)"
- name: "semver: patch"
  color: "c2e0c6"
  description: "Backward-compatible fix (fix)"

# --- Process ---
- name: "frontend"
  color: "1d76db"
  description: "Touches the web UI / frontend deps (gated by the visual check)"
- name: "needs issue"
  color: "e99695"
  description: "PR without a linked issue"
- name: "duplicate"
  color: "cfd3d7"
  description: "This already exists"
- name: "stale"
  color: "795548"
  description: "Inactive — will be closed automatically"
- name: "pinned"
  color: "0e8a16"
  description: "Exempt from the stale bot"
